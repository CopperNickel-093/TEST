```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>现地计划书 v7.0</title>

<style>
body{
  margin:0;
  font-family:system-ui,Segoe UI,Roboto;
  background:#050b18 url("back.png") center/cover fixed;
  color:#bdf3ff;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

h1{font-size:20px;margin:0}

.actions{display:flex;gap:10px}

.btn{
  height:38px;
  padding:0 16px;
  border-radius:14px;
  border:1px solid rgba(125,211,255,.2);
  background:rgba(9,18,32,.6);
  color:#bdf3ff;
  cursor:pointer;
}

.btn.primary{background:#243cff44}
.btn.danger{background:#ff404044;border-color:#ff8080}

.table{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.item{
  display:grid;
  grid-template-columns:210px 1.8fr 200px 140px 80px;
  gap:14px;
  padding:14px;
  border-radius:18px;
  border:1px solid rgba(125,211,255,.15);
  background:rgba(6,14,28,.6);
}

.rightBtns{
  display:flex;
  flex-direction:column;
  gap:6px;
}

canvas{
  width:100%;
  height:180px;
}

.chartCard{
  border:1px solid rgba(125,211,255,.12);
  border-radius:20px;
  padding:10px;
}

.charts{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:14px;
  margin-bottom:20px;
}

</style>
</head>

<body>

<div class="container">

<header>
<h1>Genchi Planner v7.0</h1>

<div class="actions">
<button class="btn danger" id="btnImportOfficial">导入公式JSON</button>
<button class="btn" id="btnImport">导入JSON</button>
<button class="btn primary" id="btnExport">导出JSON</button>
</div>

</header>

<section class="charts">

<div class="chartCard">
<b>国家分布</b>
<canvas id="pie_country"></canvas>
</div>

<div class="chartCard">
<b>城市分布</b>
<canvas id="pie_city"></canvas>
</div>

<div class="chartCard">
<b>航司分布</b>
<canvas id="pie_airline"></canvas>
</div>

<div class="chartCard">
<b>女声优次数</b>
<canvas id="pie_seiyuu"></canvas>
</div>

</section>

<section class="table" id="list"></section>

</div>

<script>

const state={items:[]}

function save(){
 localStorage.setItem("genchi_items",JSON.stringify(state.items))
}

function load(){
 const d=localStorage.getItem("genchi_items")
 if(d) state.items=JSON.parse(d)
}

function exportJSON(){
 const blob=new Blob([JSON.stringify({items:state.items},null,2)])
 const a=document.createElement("a")
 a.href=URL.createObjectURL(blob)
 a.download="genchi_export.json"
 a.click()
}

function importJSON(file){
 const reader=new FileReader()
 reader.onload=()=>{
 const data=JSON.parse(reader.result)
 state.items=data.items||[]
 save()
 renderAll()
 }
 reader.readAsText(file)
}

async function importOfficial(){
 const r=await fetch("genchi_import_events_2025_2026_v2.json")
 const data=await r.json()
 state.items=data.items||[]
 save()
 renderAll()
}

function renderList(){
 const box=document.getElementById("list")
 box.innerHTML=""

 state.items.forEach(it=>{
 const el=document.createElement("div")
 el.className="item"

 el.innerHTML=`
 <div>${it.date||""}</div>
 <div>${it.live||""}</div>
 <div>${it.airline||""}</div>
 <div>${it.ticketPrice||0}</div>
 <div class="rightBtns">
 <button class="btn">编辑</button>
 <button class="btn danger">删除</button>
 </div>`

 box.appendChild(el)
 })
}

function drawDonut(canvas,data){
 const rect=canvas.getBoundingClientRect()
 const dpr=window.devicePixelRatio||1

 canvas.width=rect.width*dpr
 canvas.height=rect.height*dpr

 const ctx=canvas.getContext("2d")
 ctx.scale(dpr,dpr)

 ctx.clearRect(0,0,rect.width,rect.height)

 const total=data.reduce((a,b)=>a+b[1],0)||1
 let start=-Math.PI/2

 data.forEach((p,i)=>{
 const frac=p[1]/total
 const end=start+frac*Math.PI*2

 ctx.beginPath()
 ctx.moveTo(rect.width/2,rect.height/2)
 ctx.arc(rect.width/2,rect.height/2,60,start,end)
 ctx.fillStyle=`hsl(${i*60},80%,60%)`
 ctx.fill()

 start=end
 })
}

function renderCharts(){
 drawDonut(document.getElementById("pie_country"),[["JP",5],["CN",2]])
 drawDonut(document.getElementById("pie_city"),[["Tokyo",3],["Osaka",2]])
 drawDonut(document.getElementById("pie_airline"),[["ANA",2],["JAL",1]])
 drawDonut(document.getElementById("pie_seiyuu"),[["Aimi",3],["Riko",2]])
}

function renderAll(){
 renderList()
 renderCharts()
}

window.addEventListener("resize",renderCharts)

// wire

document.getElementById("btnExport").onclick=exportJSON

document.getElementById("btnImportOfficial").onclick=importOfficial

document.getElementById("btnImport").onclick=()=>{
 const input=document.createElement("input")
 input.type="file"
 input.onchange=e=>importJSON(e.target.files[0])
 input.click()
}

load()
renderAll()

</script>

</body>
</html>
